<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logout — $(identity)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a1a;
      background-image:
        radial-gradient(ellipse at 50% 50%, rgba(255, 149, 0, 0.08) 0%, transparent 50%);
      padding: 20px;
    }

    .container { width: 100%; max-width: 420px; }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 40px 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    .logout-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #ff9500, #ff6b00);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(255, 149, 0, 0.3);
      font-size: 36px;
    }

    h1 {
      color: #ffffff;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.4);
      font-size: 14px;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 28px;
    }

    .stat {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 14px 8px;
    }

    .stat .value {
      color: white;
      font-size: 14px;
      font-weight: 700;
    }

    .stat .label {
      color: rgba(255, 255, 255, 0.3);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    .btn-login {
      display: inline-block;
      padding: 14px 40px;
      background: linear-gradient(135deg, #5856d6, #7c5ce7);
      border-radius: 14px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(88, 86, 214, 0.4);
    }

    .footer {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.2);
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logout-icon">👋</div>

      <h1>Sesi Berakhir</h1>
      <p class="subtitle">
        Terima kasih sudah menggunakan layanan kami,<br>
        <strong style="color:white">$(username)</strong>
      </p>

      <div class="stats">
        <div class="stat">
          <div class="value">$(uptime)</div>
          <div class="label">Durasi</div>
        </div>
        <div class="stat">
          <div class="value">$(bytes-in-nice)</div>
          <div class="label">Download</div>
        </div>
        <div class="stat">
          <div class="value">$(bytes-out-nice)</div>
          <div class="label">Upload</div>
        </div>
      </div>

      <a href="$(link-login)" class="btn-login">🔄 Login Kembali</a>

      <div class="footer">
        <p>$(identity) • Powered by MikroBot</p>
      </div>
    </div>
  </div>
</body>
</html>
