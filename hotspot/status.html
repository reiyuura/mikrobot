<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="60;url=$(link-status)">
  <title>Status — $(identity)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a1a;
      background-image:
        radial-gradient(ellipse at 30% 50%, rgba(0, 122, 255, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 30%, rgba(88, 86, 214, 0.08) 0%, transparent 50%);
      padding: 20px;
    }

    .container { width: 100%; max-width: 420px; }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 36px 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .header h1 {
      color: white;
      font-size: 20px;
      font-weight: 700;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(52, 199, 89, 0.1);
      border: 1px solid rgba(52, 199, 89, 0.2);
      border-radius: 20px;
      padding: 6px 14px;
      color: #34c759;
      font-size: 12px;
      font-weight: 600;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #34c759;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .user-banner {
      background: linear-gradient(135deg, rgba(88, 86, 214, 0.15), rgba(0, 194, 255, 0.1));
      border: 1px solid rgba(88, 86, 214, 0.15);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      margin-bottom: 20px;
    }

    .user-banner .username {
      color: white;
      font-size: 18px;
      font-weight: 700;
    }

    .user-banner .uptime {
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      margin-top: 6px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 16px;
      text-align: center;
    }

    .stat-card .icon {
      font-size: 20px;
      margin-bottom: 8px;
    }

    .stat-card .value {
      color: white;
      font-size: 16px;
      font-weight: 700;
    }

    .stat-card .label {
      color: rgba(255, 255, 255, 0.35);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    .info-list {
      margin-bottom: 24px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .info-row:last-child { border-bottom: none; }

    .info-row .key {
      color: rgba(255, 255, 255, 0.4);
      font-size: 13px;
    }

    .info-row .val {
      color: white;
      font-size: 13px;
      font-weight: 500;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .actions {
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
      text-decoration: none;
      border: none;
    }

    .btn-refresh {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
    }

    .btn-refresh:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .btn-logout {
      background: rgba(255, 59, 48, 0.15);
      border: 1px solid rgba(255, 59, 48, 0.2);
      color: #ff6b6b;
    }

    .btn-logout:hover {
      background: rgba(255, 59, 48, 0.25);
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      color: rgba(255, 255, 255, 0.2);
      font-size: 11px;
    }

    @media (max-width: 480px) {
      .card { padding: 28px 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <h1>📊 Status</h1>
        <div class="status-badge">
          <div class="status-dot"></div>
          Online
        </div>
      </div>

      <div class="user-banner">
        <div class="username">👤 $(username)</div>
        <div class="uptime">Online: $(uptime)</div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="icon">📥</div>
          <div class="value">$(bytes-in-nice)</div>
          <div class="label">Download</div>
        </div>
        <div class="stat-card">
          <div class="icon">📤</div>
          <div class="value">$(bytes-out-nice)</div>
          <div class="label">Upload</div>
        </div>
      </div>

      <div class="info-list">
        <div class="info-row">
          <span class="key">IP Address</span>
          <span class="val">$(ip)</span>
        </div>
        <div class="info-row">
          <span class="key">MAC Address</span>
          <span class="val">$(mac)</span>
        </div>
        <div class="info-row">
          <span class="key">Sisa Waktu</span>
          <span class="val">$(session-time-left)</span>
        </div>
      </div>

      <div class="actions">
        <a href="$(link-status)" class="btn btn-refresh">🔄 Refresh</a>
        <a href="$(link-logout)" class="btn btn-logout">🚪 Logout</a>
      </div>

      <div class="footer">
        <p>$(identity) • Auto-refresh 60s • Powered by MikroBot</p>
      </div>
    </div>
  </div>
</body>
</html>
